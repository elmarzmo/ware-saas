<h1>Products</h1>
<div class="form">
    <input placeholder="Name" [(ngModel)]="newProduct.name" name="name"/>
    <input placeholder="SKU" [(ngModel)]="newProduct.sku" name="sku"/>
    <input type="number" placeholder="Quantity" [(ngModel)]="newProduct.quantity" name="quantity"/>
    <button (click)="createProduct()">Add Product</button>
</div>

<table>
    <tr>
        <th>Name</th>
        <th>SKU</th>
        <th>Quantity</th>
        <th>Actions</th>
    </tr>
    <tr *ngFor="let product of products">
        <td>{{ product.name }}</td>
        <td>{{ product.sku }}</td>
        <td>{{ product.quantity }}</td>
        <td>
            <button (click)="updateProduct(product.id, product)">Update Product</button>
            <button (click)="deleteProduct(product.id)">Delete</button>
        </td>
    </tr>
</table>
